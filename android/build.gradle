// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

// [withCameraXVersionPin] Managed by plugins/withCameraXVersionPin.js — see that file for the full rationale.
// [withCameraXVersionPin] Pins CameraX so react-native-vision-camera (compiled against 1.5.0-alpha03) does not
// [withCameraXVersionPin] get expo-camera's CameraX 1.6.0 at runtime (NoClassDefFoundError: Camera2CameraInfoImpl).
allprojects {
  configurations.configureEach {
    resolutionStrategy {
      force(
        'androidx.camera:camera-core:1.5.0-alpha03',
        'androidx.camera:camera-camera2:1.5.0-alpha03',
        'androidx.camera:camera-lifecycle:1.5.0-alpha03',
        'androidx.camera:camera-video:1.5.0-alpha03',
        'androidx.camera:camera-view:1.5.0-alpha03',
        'androidx.camera:camera-extensions:1.5.0-alpha03',
        'androidx.camera:camera-mlkit-vision:1.5.0-alpha03'
      )
    }
  }
}
